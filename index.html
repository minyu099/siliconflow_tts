<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人配音室</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">🎤 私人语音合成站</h1>
        <textarea id="text" class="w-full h-40 p-4 border border-gray-200 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="请输入要转换的文字..."></textarea>
        <button id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-lg">开始合成</button>
        <audio id="audio" class="w-full mt-6 hidden" controls></audio>
        <p id="status" class="mt-4 text-sm text-gray-500 text-center"></p>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const textInput = document.getElementById('text');
        const audio = document.getElementById('audio');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text) return alert('请输入文字');
            
            btn.disabled = true;
            btn.innerText = '合成中...';
            status.innerText = '正在呼叫硅基流动服务器...';

            try {
                const response = await fetch('https://api.siliconflow.cn/v1/audio/speech', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer YOUR_API_KEY', // 这里会自动读取你填的环境变量，或者你直接贴Key
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "FunAudioLLM/CosyVoice2-0.5B",
                        input: text,
                        voice: "speech:xxxx" // 这里填你喜欢的音色ID
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    audio.src = URL.createObjectURL(blob);
                    audio.classList.remove('hidden');
                    audio.play();
                    status.innerText = '合成成功！';
                } else {
                    const err = await response.json();
                    status.innerText = '出错啦: ' + (err.message || '未知错误');
                }
            } catch (e) {
                status.innerText = '连接失败，请检查网络';
            } finally {
                btn.disabled = false;
                btn.innerText = '开始合成';
            }
        };
    </script>
</body>
</html>
