<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 AI 语音实验室 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-xl">
        <div class="flex items-center justify-center mb-6">
            <span class="text-4xl mr-3">🎬</span>
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">私人配音实验室</h1>
        </div>

        <div class="space-y-5">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 hidden" id="keyBox">
                <label class="block text-sm font-semibold text-gray-700 mb-2">硅基流动 API Key</label>
                <input id="apiKey" type="password" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="请输入 sk- 开头的密钥">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">待合成文本</label>
                <textarea id="text" class="w-full h-32 p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none shadow-sm" placeholder="输入你想听的话..."></textarea>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 space-y-4 shadow-inner">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">🎬 语气导演 (AI自动感知)</label>
                        <input id="emotion" type="text" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="如：极度激动、哽咽地...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-2">⏱️ 语速调节 (<span id="speedValue" class="text-blue-600 font-bold">1.0</span>x)</label>
                        <input id="speed" type="range" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer mt-3">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">选择音色</label>
                    <select id="voiceSelect" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-white mb-2 cursor-pointer focus:ring-2 focus:ring-blue-400 shadow-sm">
                        <option value="custom">👉 自定义克隆音色...</option>
                        <optgroup label="👩 官方女声">
                            <option value="FunAudioLLM/CosyVoice2-0.5B:anna">Anna (稳重女声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:bella">Bella (热情女声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:claire">Claire (温柔女声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:diana">Diana (欢快女声)</option>
                        </optgroup>
                        <optgroup label="👨 官方男声">
                            <option value="FunAudioLLM/CosyVoice2-0.5B:alex" selected>Alex (稳重男声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:benjamin">Benjamin (低沉男声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:charles">Charles (磁性男声)</option>
                            <option value="FunAudioLLM/CosyVoice2-0.5B:david">David (欢快男声)</option>
                        </optgroup>
                    </select>
                    <input id="voiceId" type="text" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 hidden shadow-sm" placeholder="例如: speech:xxxx">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">模型选择</label>
                    <select id="model" class="w-full p-3 border border-gray-200 rounded-xl outline-none bg-white cursor-pointer focus:ring-2 focus:ring-blue-400 shadow-sm">
                        <option value="FunAudioLLM/CosyVoice2-0.5B">CosyVoice2 (最新推荐)</option>
                        <option value="FunAudioLLM/CosyVoice-300M">CosyVoice 一代</option>
                        <option value="fishaudio/fish-speech-1.5">Fish Speech 1.5</option>
                    </select>
                </div>
            </div>

            <button id="btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.02] shadow-lg text-lg">
                🎙️ 立即合成语音
            </button>

            <div id="playerBox" class="hidden mt-6 flex flex-col gap-4">
                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-200 shadow-inner">
                    <audio id="audio" class="w-full" controls></audio>
                </div>
                <a id="downloadBtn" href="#" download="我的克隆语音.mp3" class="w-full text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-2xl transition-all shadow-md">
                    ⬇️ 一键下载 MP3
                </a>
            </div>

            <p id="status" class="text-xs text-gray-500 text-center uppercase tracking-widest font-medium"></p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const textInput = document.getElementById('text');
        const emotionInput = document.getElementById('emotion');
        const speedInput = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        const voiceSelect = document.getElementById('voiceSelect');
        const voiceInput = document.getElementById('voiceId');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('model');
        const audio = document.getElementById('audio');
        const playerBox = document.getElementById('playerBox');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const keyBox = document.getElementById('keyBox');

        // 语速滑块动态显示数字
        speedInput.addEventListener('input', () => {
            speedValue.innerText = parseFloat(speedInput.value).toFixed(1);
        });

        // 联动效果：自定义音色框
        voiceSelect.addEventListener('change', () => {
            if (voiceSelect.value === 'custom') {
                voiceInput.classList.remove('hidden');
            } else {
                voiceInput.classList.add('hidden');
            }
        });

        // 读取本地缓存
        const savedKey = localStorage.getItem('my_saved_api_key') || '';
        apiKeyInput.value = savedKey;
        if(!savedKey) keyBox.classList.remove('hidden'); // 如果没有缓存Key，就显示Key输入框
        else keyBox.classList.remove('hidden'); // 保持显示以便修改
        
        const savedCustomId = localStorage.getItem('my_saved_voice_id');
        if(savedCustomId) voiceInput.value = savedCustomId;
        const savedModel = localStorage.getItem('my_saved_model');
        if(savedModel) modelSelect.value = savedModel;

        btn.onclick = async () => {
            const rawText = textInput.value.trim();
            const emotion = emotionInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            const speed = parseFloat(speedInput.value);
            
            if (!apiKey) return alert('请先填入你的 API Key！');
            if (!rawText) return alert('请填入待合成的文字！');

            // 【黑科技】将语气提示词巧妙地融合进文本中
            const finalText = emotion ? `(${emotion}) ${rawText}` : rawText;

            let finalVoice = "";
            if (voiceSelect.value === 'custom') {
                finalVoice = voiceInput.value.trim();
                if (!finalVoice) return alert('请填入自定义的音色 ID！');
                localStorage.setItem('my_saved_voice_id', finalVoice);
            } else {
                finalVoice = voiceSelect.value;
            }
            
            localStorage.setItem('my_saved_api_key', apiKey);
            localStorage.setItem('my_saved_model', modelSelect.value);

            btn.disabled = true;
            btn.innerText = '✨ AI 导演正在导戏中...';
            status.innerText = '连接服务器...';
            playerBox.classList.add('hidden'); // 重新合成时先隐藏播放器

            try {
                const response = await fetch('https://api.siliconflow.cn/v1/audio/speech', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        input: finalText,
                        voice: finalVoice,
                        response_format: "mp3",
                        speed: speed
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    
                    audio.src = audioUrl;
                    downloadBtn.href = audioUrl; // 绑定下载链接
                    
                    playerBox.classList.remove('hidden');
                    audio.play();
                    status.innerText = 'SUCCESS: 爆款语音合成完毕！';
                } else {
                    const err = await response.json();
                    status.innerText = 'ERROR: ' + (err.message || '合成失败');
                }
            } catch (e) {
                status.innerText = 'FAIL: 网络连接异常';
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = '🎙️ 立即合成语音';
            }
        };
    </script>
</body>
</html>
